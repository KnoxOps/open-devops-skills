<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Topology</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font:14px/1.6 system-ui;padding:24px}
h2{font-size:18px;margin-bottom:16px;color:#58a6ff}
#graph{width:100%;height:620px;border-radius:12px;overflow:hidden;border:1px solid #30363d;background:#161b22}
.legend{display:flex;gap:16px;margin-top:12px;font-size:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#8b949e}
.error{display:flex;align-items:center;justify-content:center;height:100%;color:#f85149}
</style>
</head>
<body>
<h2 id="title">Traffic Topology</h2>
<div id="graph"><div class="loading">Loading...</div></div>
<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:rgba(13,148,136,0.6)"></span> cache</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(79,70,229,0.6)"></span> service</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(217,119,6,0.6)"></span> database</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(220,38,38,0.6)"></span> gateway</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(124,58,237,0.6)"></span> storage</div>
  <div class="legend-item"><span class="legend-dot" style="background:rgba(107,114,128,0.5);border:1px dashed #6b7280"></span> unmapped</div>
</div>

<script id="data" type="application/json">
{"host_label":"VM","edges":[]}
</script>

<script>
(function() {
  var graphEl = document.getElementById('graph');

  // Check CDN loading before rendering
  if (typeof d3 === 'undefined' || typeof dagre === 'undefined') {
    graphEl.innerHTML = '<div class="error">Failed to load d3 or dagre library — check CDN access</div>';
    return;
  }

  var data;
  try {
    data = JSON.parse(document.getElementById('data').textContent);
    if (!data.edges || !Array.isArray(data.edges)) throw new Error('edges array required');
    document.getElementById('title').textContent = 'Traffic — ' + (data.host_label || 'VM');
  } catch(e) {
    graphEl.innerHTML = '<div class="error">' + e.message + '</div>';
    throw e;
  }

  var hostId = 'host';
  var hostLabel = data.host_label || 'VM';
  // Use host_ip from data first, fall back to regex from host_label
  var hostIp = data.host_ip || (hostLabel.match(/(\d+\.\d+\.\d+\.\d+)/) || [''])[0];
  var edges = data.edges;

  var TYPE_COLORS = {
    cache:'#0d9488', database:'#d97706', service:'#4f46e5',
    gateway:'#dc2626', storage:'#7c3aed', queue:'#f59e0b', unknown:'#6b7280'
  };

  // Build graph: host as one node, peers as unique IP:port
  var g = new dagre.graphlib.Graph();
  g.setGraph({rankdir:'TB', nodesep:90, edgesep:50, ranksep:70, marginx:50, marginy:50});
  g.setDefaultEdgeLabel(function() { return {}; });
  g.setNode(hostId, {label: hostLabel, type:'service', status:'healthy', width:180, height:56});

  edges.forEach(function(e, i) {
    var srcIp = e.src_ip || '', dstIp = e.dst_ip || '';
    var srcPort = e.src_port, dstPort = e.dst_port;
    var srcProc = e.src_process, dstProc = e.dst_process;
    var srcIsHost = hostIp && srcIp === hostIp;
    var dstIsHost = hostIp && dstIp === hostIp;

    var peerIp, peerPort, peerProc, peerType, fromHostToPeer;
    if (dstIsHost) {
      peerIp = srcIp; peerPort = srcPort; peerProc = srcProc;
      peerType = e.src_service_type || 'unknown';
      fromHostToPeer = false;
    } else {
      peerIp = dstIp; peerPort = dstPort; peerProc = dstProc;
      peerType = e.dst_service_type || 'unknown';
      fromHostToPeer = true;
    }

    var peerId = peerIp + ':' + (peerPort || '');
    var peerLabel = peerIp + ':' + (peerPort || '');
    if (peerProc) peerLabel += '\n' + peerProc;

    var peerStatus = e.classification === 'unmapped' ? 'degraded' : 'healthy';
    if (!g.hasNode(peerId)) {
      g.setNode(peerId, {label: peerLabel, type: peerType, status: peerStatus, width: 200, height: 50});
    }

    var existing = g.edge(fromHostToPeer ? hostId : peerId, fromHostToPeer ? peerId : hostId);
    var rateSum = (existing ? parseFloat(existing.rate||0) : 0) + (e.rate_kbps || 0);
    var INFRA_CLASS = {datadog:true, sentinel:true, system:true, monitoring:true, health_check:true};
    var status = e.classification === 'unmapped' ? 'warning' : (INFRA_CLASS[e.classification] ? null : 'healthy');
    var label = Math.round(rateSum) + ' Kb/s';

    g.setEdge(fromHostToPeer ? hostId : peerId, fromHostToPeer ? peerId : hostId, {
      label: label, rate: rateSum, status: status
    });
  });

  dagre.layout(g);

  // Use getElementById to avoid CSS selector parsing issues with IP dots
  var svg = d3.select(graphEl).html('').append('svg')
    .attr('width', '100%').attr('height', '100%');
  var inner = svg.append('g');
  var zoom = d3.zoom().on('zoom', function(e) { inner.attr('transform', e.transform); });
  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(40, 40));

  var defs = svg.append('defs');
  ['healthy','warning',null].forEach(function(s) {
    var c = s==='healthy'?'#3fb950':s==='warning'?'#d29922':'#484f58';
    defs.append('marker').attr('id','a-'+String(s)).attr('viewBox','0 0 10 10')
      .attr('refX',28).attr('refY',5).attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
      .append('path').attr('d','M 0 0 L 10 5 L 0 10 z').attr('fill',c);
  });

  inner.selectAll('.edge').data(g.edges()).enter().append('path')
    .attr('fill','none')
    .attr('stroke', function(d) { var s=g.edge(d).status; return s==='healthy'?'rgba(63,185,80,0.35)':s==='warning'?'rgba(210,153,34,0.45)':'rgba(72,79,88,0.25)'; })
    .attr('stroke-width', function(d) { return parseFloat(g.edge(d).rate) > 10 ? 2 : 1; })
    .attr('marker-end', function(d) { return 'url(#a-'+String(g.edge(d).status)+')'; })
    .attr('d', function(e) {
      var pts = g.edge(e).points;
      return d3.line().x(function(p){return p.x}).y(function(p){return p.y})(pts);
    });

  inner.selectAll('.elabel').data(g.edges()).enter().append('text')
    .attr('text-anchor','middle').attr('font-size',9).attr('font-family','monospace').attr('fill','#8b949e')
    .attr('x', function(e) { var pts=g.edge(e).points, m=Math.floor(pts.length/2); return pts[m].x; })
    .attr('y', function(e) { var pts=g.edge(e).points, m=Math.floor(pts.length/2); return pts[m].y - 4; })
    .text(function(e) { return g.edge(e).label; });

  var nodeG = inner.selectAll('.node').data(g.nodes()).enter().append('g');
  nodeG.append('rect')
    .attr('rx',10).attr('ry',10)
    .attr('fill', function(d) { var n=g.node(d); var c=TYPE_COLORS[n.type]||TYPE_COLORS.unknown; return 'rgba('+parseInt(c.slice(1,3),16)+','+parseInt(c.slice(3,5),16)+','+parseInt(c.slice(5,7),16)+',0.12)'; })
    .attr('stroke', function(d) { return TYPE_COLORS[g.node(d).type]||TYPE_COLORS.unknown; })
    .attr('stroke-width', function(d) { return d===hostId?2:1.5; })
    .attr('stroke-dasharray', function(d) { return g.node(d).status==='degraded'?'4 3':null; })
    .attr('width', function(d) { return g.node(d).width; }).attr('height', function(d) { return g.node(d).height; })
    .attr('x', function(d) { return g.node(d).x - g.node(d).width/2; })
    .attr('y', function(d) { return g.node(d).y - g.node(d).height/2; });

  nodeG.each(function(d) {
    var nd = g.node(d), el = d3.select(this);
    var lines = nd.label.split('\n');
    el.append('text').attr('text-anchor','middle').attr('font-weight',600)
      .attr('fill', d===hostId?'#f0f6fc':'#f0f6fc').attr('font-size',d===hostId?12:11)
      .attr('x',nd.x).attr('y',nd.y - (lines.length-1)*7).text(lines[0]);
    for (var i=1; i<lines.length; i++) {
      el.append('text').attr('text-anchor','middle').attr('font-size',9)
        .attr('fill','#8b949e').attr('x',nd.x).attr('y',nd.y + (i-1)*10 + 4).text(lines[i]);
    }
    el.append('text').attr('text-anchor','middle').attr('font-size',8)
      .attr('font-family','monospace').attr('text-transform','uppercase')
      .attr('fill',{healthy:'#3fb950',warning:'#d29922',degraded:'#d29922'}[nd.status]||'#8b949e')
      .attr('x',nd.x).attr('y',nd.y + nd.height/2 - 4).text(nd.status);
  });

  svg.attr('viewBox', '0 0 ' + (g.graph().width+80) + ' ' + (g.graph().height+80));
})();
</script>
</body>
</html>
